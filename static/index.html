<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人知识库 Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #fafbfc; --surface: #ffffff; --border: #e4e7eb;
            --text: #1a1a2e; --text2: #6b7280; --text3: #9ca3af;
            --accent: #2563eb; --accent-hover: #1d4ed8; --accent-light: #eff6ff;
            --green: #059669; --red: #dc2626; --orange: #d97706;
            --radius: 10px; --radius-sm: 6px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
            --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,.06), 0 2px 4px -2px rgba(0,0,0,.04);
            --sidebar-w: 220px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
            background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;
            font-size:14px;line-height:1.6;
        }

        /* ============ Sidebar ============ */
        .sidebar{
            width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);
            display:flex;flex-direction:column;flex-shrink:0;z-index:20;
        }
        .sidebar-brand{
            padding:18px 20px 14px;border-bottom:1px solid var(--border);
            display:flex;align-items:center;gap:10px;
        }
        .sidebar-brand .icon{
            width:34px;height:34px;background:linear-gradient(135deg,var(--accent),#7c3aed);
            border-radius:8px;display:flex;align-items:center;justify-content:center;
            font-size:17px;color:#fff;flex-shrink:0;
        }
        .sidebar-brand h1{font-size:15px;font-weight:700;letter-spacing:-0.3px;line-height:1.2}
        .sidebar-brand .ver{font-size:10px;color:var(--text3);font-weight:400}
        .sidebar-nav{flex:1;padding:10px 12px;display:flex;flex-direction:column;gap:2px}
        .sidebar-nav button{
            display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;
            border:none;background:transparent;border-radius:var(--radius-sm);
            font-size:13px;cursor:pointer;color:var(--text2);text-align:left;
            transition:.15s;font-family:inherit;
        }
        .sidebar-nav button:hover{background:#f3f4f6;color:var(--text)}
        .sidebar-nav button.active{background:var(--accent-light);color:var(--accent);font-weight:600}
        .sidebar-nav .badge{
            margin-left:auto;background:var(--accent);color:#fff;font-size:10px;
            padding:1px 7px;border-radius:10px;font-weight:600;
        }
        .sidebar-footer{
            padding:12px 20px;border-top:1px solid var(--border);
            font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;
        }
        .sidebar-footer .dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}

        /* ============ Main ============ */
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .page{display:none;flex:1;overflow-y:auto;flex-direction:column}
        .page.active{display:flex}
        .page::-webkit-scrollbar{width:4px}
        .page::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:10px}

        /* ============ Cards ============ */
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:16px;box-shadow:var(--shadow-sm)}
        .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
        .card-header h3{font-size:15px;font-weight:600}
        .card-header .sub{font-size:12px;color:var(--text3);font-weight:400;margin-left:8px}

        /* ============ Buttons ============ */
        .btn{padding:7px 15px;border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;transition:.15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
        .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
        .btn-primary:disabled{background:#94a3b8;cursor:not-allowed}
        .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
        .btn-danger{color:var(--red);background:transparent;border:1px solid transparent}.btn-danger:hover{background:#fef2f2;border-color:#fecaca}
        .btn-sm{padding:4px 10px;font-size:11px}

        /* ============ Stats ============ */
        .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:0 16px 0}
        .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;box-shadow:var(--shadow-sm)}
        .stat-card .val{font-size:24px;font-weight:700;color:var(--text);line-height:1}
        .stat-card .lbl{font-size:11px;color:var(--text3);margin-top:6px}

        /* ============ Upload Zone ============ */
        .upload-zone{
            border:2px dashed var(--border);border-radius:var(--radius);padding:36px 20px;
            text-align:center;cursor:pointer;transition:.2s;margin-bottom:16px;
        }
        .upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-light)}
        .upload-zone .icon{font-size:36px;margin-bottom:8px;opacity:.7}
        .upload-zone p{font-size:13px;color:var(--text2)}
        .upload-zone .hint{font-size:11px;color:var(--text3);margin-top:4px}
        #fileInput{display:none}

        /* ============ File Table ============ */
        .file-table{width:100%;border-collapse:collapse;font-size:13px}
        .file-table th{text-align:left;padding:8px 12px;font-weight:600;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
        .file-table td{padding:10px 12px;border-bottom:1px solid #f3f4f6}
        .file-table tr:hover td{background:#f9fafb}
        .file-table .fname{font-weight:500;display:flex;align-items:center;gap:8px}
        .file-table .fname .fi{font-size:16px}
        .file-table .ftag{font-size:10px;padding:2px 7px;border-radius:4px;background:#f3f4f6;text-transform:uppercase;letter-spacing:.5px}
        .file-table .fsize{color:var(--text3)}
        .file-table .fchunks{font-weight:600;color:var(--accent)}
        .empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
        .empty-state .icon{font-size:40px;margin-bottom:10px;opacity:.5}

        /* ============ Chat Page ============ */
        .chat-area{display:flex;flex-direction:column;flex:1;overflow:hidden;margin:0 16px 16px}
        .chat-main{flex:1;overflow-y:auto;padding:8px 0}
        .chat-main::-webkit-scrollbar{width:4px}.chat-main::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:10px}
        .msg{display:flex;gap:10px;margin-bottom:18px;animation:slideUp .3s ease}
        @keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .msg.user{flex-direction:row-reverse}
        .msg .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;user-select:none}
        .msg.user .avatar{background:#e0e7ff;color:var(--accent)}
        .msg.assistant .avatar{background:#ecfdf5;color:var(--green)}
        .msg .bubble{padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.7;max-width:75%;word-break:break-word}
        .msg.user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
        .msg.assistant .bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:var(--shadow-sm)}
        .msg.assistant .bubble h1,.msg.assistant .bubble h2,.msg.assistant .bubble h3{font-size:15px;margin:10px 0 4px;font-weight:700}
        .msg.assistant .bubble ul,.msg.assistant .bubble ol{padding-left:18px;margin:4px 0}
        .msg.assistant .bubble li{margin:2px 0}
        .msg.assistant .bubble code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:12px;font-family:'JetBrains Mono',monospace}
        .msg.assistant .bubble pre{background:#1e293b;color:#e2e8f0;padding:12px 16px;border-radius:8px;overflow-x:auto;font-size:12px;margin:8px 0}
        .msg.assistant .bubble pre code{background:none;padding:0;color:inherit}
        .msg.assistant .bubble table{border-collapse:collapse;width:100%;margin:6px 0}
        .msg.assistant .bubble td,.msg.assistant .bubble th{border:1px solid var(--border);padding:4px 8px;font-size:12px}
        .msg.assistant .bubble th{background:#f1f5f9;font-weight:600}
        .msg.assistant .bubble blockquote{border-left:3px solid var(--accent);padding-left:12px;margin:6px 0;color:var(--text2)}
        .msg.assistant .bubble strong{font-weight:600}
        .typing .bubble{display:flex;gap:5px;align-items:center;min-height:40px}
        .typing span{width:7px;height:7px;border-radius:50%;background:#b0b7c3;animation:typingBounce 1.2s infinite}
        .typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
        @keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-7px);opacity:1}}
        /* 思考卡片 */
        .thinking-card{
            background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px;margin-bottom:16px;
            display:flex;gap:12px;align-items:flex-start;animation:slideUp .3s ease;max-width:85%
        }
        .thinking-card .think-icon{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#7c3aed);
            display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0;animation:spin 2s linear infinite
        }
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        .thinking-card .think-body{flex:1}
        .thinking-card .think-title{font-weight:600;font-size:14px;color:var(--text);margin-bottom:6px}
        .thinking-card .think-steps{display:flex;gap:6px;flex-wrap:wrap}
        .thinking-card .think-step{font-size:11px;color:var(--text3);padding:3px 10px;border-radius:12px;background:#f1f5f9;transition:all .3s}
        .thinking-card .think-step.active{background:var(--accent-light);color:var(--accent);font-weight:600}
        .thinking-card .think-step.done{background:#ecfdf5;color:var(--green)}
        .chat-foot{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--border)}
        #chatInput{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;outline:none;resize:none;min-height:44px;max-height:130px;font-family:inherit;line-height:1.5;transition:.15s}
        #chatInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
        .quick-tags{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0 0}
        .qt-tag{padding:5px 12px;border:1px solid var(--border);border-radius:16px;background:var(--surface);font-size:12px;cursor:pointer;color:var(--text2);transition:.15s;white-space:nowrap}
        .qt-tag:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

        /* ============ Eval ============ */
        .eval-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0 0 16px}
        .eval-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;box-shadow:var(--shadow-sm)}
        .eval-card .elabel{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
        .eval-card .evalue{font-size:22px;font-weight:700}
        .eval-card .evalue.good{color:var(--green)}.eval-card .evalue.mid{color:var(--orange)}.eval-card .evalue.bad{color:var(--red)}
        .metric-row{margin-bottom:10px}
        .metric-row .ml{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
        .metric-row .mb{height:6px;background:#f1f5f9;border-radius:3px}
        .metric-row .mf{height:6px;border-radius:3px;transition:width .5s}
        .mf.good{background:var(--green)}.mf.mid{background:var(--orange)}.mf.bad{background:var(--red)}
        .fail-item{background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:10px;margin-bottom:6px;font-size:12px}
        .fail-item .fq{font-weight:600;margin-bottom:3px}

        /* ============ Toast ============ */
        .toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:13px;color:#fff;z-index:999;animation:slideUp .3s;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:360px}
        .toast.ok{background:var(--green)}.toast.err{background:var(--red)}

        /* ============ Responsive ============ */
        @media(max-width:768px){
            .sidebar{width:180px}.sidebar-brand h1{font-size:13px}
            .stat-grid{grid-template-columns:repeat(2,1fr)}
            .eval-grid{grid-template-columns:repeat(2,1fr)}
            .msg .bubble{max-width:90%}
            .card{margin:10px}
        }
        @media(max-width:480px){
            body{flex-direction:column}.sidebar{width:100%;flex-direction:row;padding:8px 12px;align-items:center;gap:6px}
            .sidebar-brand,.sidebar-footer{display:none}
            .sidebar-nav{flex-direction:row;padding:0;gap:4px}
            .sidebar-nav button{padding:6px 10px;font-size:12px}
            .main{flex:1}
        }
    </style>
</head>
<body>

<!-- ============ Sidebar ============ -->
<div class="sidebar">
    <div class="sidebar-brand">
        <div class="icon">&#x1F4DA;</div>
        <div><h1>知识库 Agent<span class="ver"> v2.1</span></h1></div>
    </div>
    <div class="sidebar-nav">
        <button class="active" onclick="switchPage('chat')">
            <span>&#x1F4AC;</span> 智能问答
        </button>
        <button onclick="switchPage('knowledge')">
            <span>&#x1F4C2;</span> 知识库
            <span class="badge" id="fileCountBadge">0</span>
        </button>
        <button onclick="switchPage('eval')">
            <span>&#x1F4CA;</span> 评测报告
        </button>
    </div>
    <div class="sidebar-footer">
        <span class="dot"></span> 服务运行中 · 127.0.0.1:8000
    </div>
</div>

<!-- ============ Main ============ -->
<div class="main">

<!-- ===== 智能问答 ===== -->
<div class="page active" id="page-chat">
    <div class="chat-area">
        <div class="quick-tags">
            <span class="qt-tag" onclick="quickAsk('Python 中 list 和 tuple 有什么区别？')">Python: list vs tuple</span>
            <span class="qt-tag" onclick="quickAsk('Django ORM 中 select_related 和 prefetch_related 区别')">Django ORM</span>
            <span class="qt-tag" onclick="quickAsk('FastAPI 的依赖注入是如何实现的？')">FastAPI DI</span>
            <span class="qt-tag" onclick="quickAsk('Django 中间件的执行流程是什么？')">Django 中间件</span>
            <span class="qt-tag" onclick="quickAsk('Python __init__ 和 __new__ 方法有什么区别？')">__new__ vs __init__</span>
        </div>
        <div class="chat-main" id="chatMessages"></div>
        <div class="chat-foot">
            <textarea id="chatInput" placeholder="提问，回车发送..." rows="1" onkeydown="handleChatKey(event)"></textarea>
            <button class="btn btn-primary" id="chatSendBtn" onclick="sendChatMessage()" style="padding:0 14px;height:44px">&#x27A4;</button>
        </div>
    </div>
</div>

<!-- ===== 知识库管理 ===== -->
<div class="page" id="page-knowledge">
    <div class="stat-grid" id="statGrid"></div>
    <div class="card">
        <div class="card-header">
            <h3>&#x1F4E5; 上传文件<span class="sub">支持 .txt · .md · .pdf</span></h3>
            <div style="display:flex;gap:6px">
                <button class="btn btn-ghost" onclick="reindexKnowledge()">&#x1F504; 重新索引</button>
                <button class="btn btn-ghost" onclick="loadKnowledge()">&#x1F504; 刷新</button>
            </div>
        </div>
        <div class="upload-zone" id="uploadZone"
             onclick="document.getElementById('fileInput').click()"
             ondragover="e=>{e.preventDefault();e.currentTarget.classList.add('drag')}"
             ondragleave="e=>e.currentTarget.classList.remove('drag')"
             ondrop="e=>{e.preventDefault();e.currentTarget.classList.remove('drag');handleFiles(e.dataTransfer.files)}">
            <div class="icon">&#x1F4C4;</div>
            <p>拖拽文件到此处，或点击选择文件</p>
            <p class="hint">相同内容的文件会自动过滤，不会重复上传</p>
        </div>
        <input type="file" id="fileInput" accept=".txt,.md,.pdf" multiple onchange="handleFiles(this.files)">
        <div id="uploadMsg" style="font-size:12px;color:var(--text3);margin-top:4px"></div>
    </div>
    <div class="card">
        <div class="card-header"><h3>&#x1F4C4; 文件列表</h3></div>
        <div id="fileListArea"></div>
    </div>
</div>

<!-- ===== 评测报告 ===== -->
<div class="page" id="page-eval">
    <div class="card">
        <div class="card-header">
            <h3>&#x1F3AF; RAG 检索评估</h3>
            <div style="display:flex;gap:6px;align-items:center">
                <span style="font-size:12px;color:var(--text3)">样本:</span>
                <select id="evalSamples" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px">
                    <option value="10">10</option><option value="20" selected>20</option><option value="30">30</option>
                </select>
                <span style="font-size:12px;color:var(--text3)">Top-K:</span>
                <select id="evalTopK" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px">
                    <option value="3">3</option><option value="5" selected>5</option><option value="10">10</option>
                </select>
                <button class="btn btn-primary btn-sm" onclick="runEval()">&#x25B6; 运行评估</button>
            </div>
        </div>
        <div id="evalContent"></div>
    </div>
</div>

</div><!-- /main -->

<script>
// ==================== Nav ====================
let currentPage='chat';
function switchPage(name){
    currentPage=name;
    document.querySelectorAll('.sidebar-nav button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelector(`.sidebar-nav button[onclick*="${name}"]`).classList.add('active');
    document.getElementById(`page-${name}`).classList.add('active');
    if(name==='knowledge') loadKnowledge();
    if(name==='chat') document.getElementById('chatInput')?.focus();
}
// ==================== Toast ====================
function toast(msg,ok){const t=document.createElement('div');t.className='toast '+(ok?'ok':'err');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
// ==================== Knowledge ====================
async function handleFiles(files){
    if(!files||!files.length)return;
    const msg=document.getElementById('uploadMsg');msg.textContent='上传中...';
    for(const f of Array.from(files)){
        const ext=f.name.split('.').pop().toLowerCase();
        if(!['txt','md','pdf'].includes(ext)){toast(`不支持 .${ext}`);continue;}
        const form=new FormData();form.append('file',f);
        try{
            const r=await fetch('/api/knowledge/upload',{method:'POST',body:form});
            const d=await r.json();
            if(r.ok&&d.success) toast(d.message,true);
            else if(r.ok&&!d.success) toast(d.message); // MD5 dup
            else toast(d.detail||'上传失败');
        }catch(e){toast('网络错误: '+e.message);}
    }
    msg.textContent='';
    loadKnowledge();
}
async function loadKnowledge(){
    try{
        const r=await fetch('/api/knowledge/stats');const d=await r.json();
        document.getElementById('fileCountBadge').textContent=d.file_count;
        document.getElementById('statGrid').innerHTML=`
            <div class="stat-card"><div class="val">${d.file_count}</div><div class="lbl">知识库文件</div></div>
            <div class="stat-card"><div class="val">${d.total_chunks}</div><div class="lbl">向量分片</div></div>
            <div class="stat-card"><div class="val">${d.collection_name}</div><div class="lbl">Chroma 集合</div></div>
            <div class="stat-card"><div class="val">&#x1F4C4;</div><div class="lbl">支持 .txt .md .pdf</div></div>`;
        const area=document.getElementById('fileListArea');
        if(!d.files.length){area.innerHTML=`<div class="empty-state"><div class="icon">&#x1F4C1;</div><p>暂无文件，拖拽文件到上方区域上传</p></div>`;return;}
        area.innerHTML=`<table class="file-table"><thead><tr><th>文件</th><th>类型</th><th>大小</th><th>分片</th><th></th></tr></thead><tbody>${
            d.files.map(f=>`<tr>
                <td><div class="fname"><span class="fi">&#x1F4C4;</span>${f.filename}</div></td>
                <td><span class="ftag">${f.type}</span></td>
                <td><span class="fsize">${(f.size/1024).toFixed(1)} KB</span></td>
                <td><span class="fchunks">${f.chunk_count}</span></td>
                <td><button class="btn btn-danger btn-sm" onclick="deleteFile('${f.filename}')">删除</button></td>
            </tr>`).join('')
        }</tbody></table>`;
    }catch(e){toast('加载失败: '+e.message);}
}
async function deleteFile(name){
    if(!confirm(`删除 "${name}"？`))return;
    try{const r=await fetch(`/api/knowledge/${encodeURIComponent(name)}`,{method:'DELETE'});const d=await r.json();toast(d.message,r.ok);loadKnowledge();}
    catch(e){toast('网络错误: '+e.message);}
}
async function reindexKnowledge(){
    toast('重新索引中...',true);
    try{const r=await fetch('/api/knowledge/reindex',{method:'POST'});const d=await r.json();toast(d.message,r.ok);loadKnowledge();}
    catch(e){toast('网络错误: '+e.message);}
}
// ==================== Chat ====================
let isChatting=false,sessionId=null;
const chatInput=document.getElementById('chatInput'),chatMsgs=document.getElementById('chatMessages'),chatBtn=document.getElementById('chatSendBtn');
chatInput.addEventListener('input',()=>{chatInput.style.height='auto';chatInput.style.height=Math.min(chatInput.scrollHeight,130)+'px'});
function handleChatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChatMessage();}}
function quickAsk(q){chatInput.value=q;sendChatMessage();}
function scrollChat(){chatMsgs.scrollTop=chatMsgs.scrollHeight}
function addMsg(role,content,final=false){
    const d=document.createElement('div');d.className='msg '+role;
    d.innerHTML=`<div class="avatar">${role==='user'?'&#x1F464;':'&#x1F916;'}</div><div class="bubble">${final?marked.parse(content):''}</div>`;
    chatMsgs.appendChild(d);scrollChat();
    if(!final) return d.querySelector('.bubble');
    return d;
}
let _thinkTimer=null;
function showThinkingCard(){
    const card=document.createElement('div');card.className='msg assistant';card.id='thinking';
    card.innerHTML=`<div class="thinking-card"><div class="think-icon">&#x1F916;</div><div class="think-body"><div class="think-title">Agent 正在思考...</div><div class="think-steps"><span class="think-step active" data-step="0">&#x1F50D; 分析问题</span><span class="think-step" data-step="1">&#x1F4DA; 检索知识库</span><span class="think-step" data-step="2">&#x1F4DD; 生成回答</span></div></div></div>`;
    chatMsgs.appendChild(card);scrollChat();
    const steps=card.querySelectorAll('.think-step');let i=0;
    _thinkTimer=setInterval(()=>{
        steps.forEach((s,idx)=>{s.classList.remove('active','done');if(idx<i)s.classList.add('done');if(idx===i)s.classList.add('active');});
        i=(i+1)%steps.length;
    },1200);
}
function hideThinkingCard(){
    if(_thinkTimer){clearInterval(_thinkTimer);_thinkTimer=null;}
    document.getElementById('thinking')?.remove();
}
async function sendChatMessage(){
    const q=chatInput.value.trim();if(!q||isChatting)return;
    isChatting=true;chatBtn.disabled=true;
    addMsg('user',q,true);
    chatInput.value='';chatInput.style.height='auto';
    showThinkingCard();
    let bubbleEl=null;
    try{
        const r=await fetch('/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,session_id:sessionId})});
        if(!r.ok)throw new Error(`HTTP ${r.status}`);
        let content='',buf='';
        const reader=r.body.getReader(),dec=new TextDecoder();
        let firstChunk=true;
        while(true){const{ done,value}=await reader.read();if(done){hideThinkingCard();break;}buf+=dec.decode(value,{stream:true});
            const lines=buf.split('\n');buf=lines.pop()||'';
            for(const l of lines){
                if(l.startsWith('event: session')){try{const d=JSON.parse(l.split('data: ')[1]);sessionId=d.session_id;}catch(e){}}
                if(l.startsWith('event: done')){try{hideThinkingCard();}catch(e){}}
                if(l.startsWith('event: error')){try{hideThinkingCard();}catch(e){}}
                if(l.startsWith('data: ')){
                    try{
                        const d=JSON.parse(l.slice(6));
                        if(d.content!==undefined){
                            if(firstChunk){firstChunk=false;bubbleEl=addMsg('assistant','');}
                            content+=d.content;
                            if(bubbleEl) bubbleEl.innerHTML=marked.parse(content);
                            scrollChat();
                        }
                    }catch(e){}
                }
            }
        }
    }catch(e){hideThinkingCard();if(!bubbleEl) addMsg('assistant','&#x26A0; 服务异常: '+e.message,true);}
    finally{isChatting=false;chatBtn.disabled=false;chatInput.focus();}
}
// ==================== Eval ====================
async function runEval(){
    const samples=document.getElementById('evalSamples').value,topK=document.getElementById('evalTopK').value;
    const el=document.getElementById('evalContent');
    el.innerHTML='<p style="text-align:center;padding:30px;color:var(--text3)">&#x1F504; 评估中...</p>';
    try{
        const r=await fetch(`/api/evaluation/run?n_samples=${samples}&top_k=${topK}`,{method:'POST'});const d=await r.json();
        if(d.error){el.innerHTML=`<p style="color:var(--red);text-align:center;padding:20px">${d.error}</p>`;return;}
        const a=d.summary.average_metrics,c=v=>v>=0.7?'good':v>=0.4?'mid':'bad';
        el.innerHTML=`
            <div class="eval-grid">
                <div class="eval-card"><div class="elabel">召回率 Recall@${topK}</div><div class="evalue ${c(a.recall)}">${(a.recall*100).toFixed(1)}%</div></div>
                <div class="eval-card"><div class="elabel">精确率 Precision@${topK}</div><div class="evalue ${c(a.precision)}">${(a.precision*100).toFixed(1)}%</div></div>
                <div class="eval-card"><div class="elabel">命中率 Hit Rate@${topK}</div><div class="evalue ${c(a.hit_rate)}">${(a.hit_rate*100).toFixed(1)}%</div></div>
                <div class="eval-card"><div class="elabel">MRR (Mean Reciprocal Rank)</div><div class="evalue ${c(a.mrr)}">${(a.mrr*100).toFixed(1)}%</div></div>
                <div class="eval-card"><div class="elabel">NDCG@${topK}</div><div class="evalue ${c(a.ndcg)}">${(a.ndcg*100).toFixed(1)}%</div></div>
                <div class="eval-card"><div class="elabel">F1 Score</div><div class="evalue ${c(a.f1)}">${a.f1.toFixed(2)}</div></div>
            </div>
            <div style="margin-top:16px">
                ${['recall','precision','mrr','ndcg'].map(m=>`
                <div class="metric-row">
                    <div class="ml"><span>${m}</span><span>${(a[m]*100).toFixed(1)}%</span></div>
                    <div class="mb"><div class="mf ${c(a[m])}" style="width:${Math.min(a[m]*100,100).toFixed(1)}%"></div></div>
                </div>`).join('')}
            </div>
            <p style="margin-top:16px;font-size:12px;color:var(--text3)">共 ${d.summary.total_tests} 个测试样本 · Top-${topK}</p>
            ${d.failures&&d.failures.length>0?`
            <div style="margin-top:14px">
                <h4 style="font-size:13px;color:var(--red);margin-bottom:8px">&#x26A0; 召回失败案例 (${d.failure_count})</h4>
                ${d.failures.slice(0,5).map(f=>`<div class="fail-item"><div class="fq">${f.question}</div><div style="color:var(--text2)">检索到: ${f.retrieved_docs?.join(', ')||'无'}</div></div>`).join('')}
            </div>`:'<p style="margin-top:14px;font-size:13px;color:var(--green)">&#x2705; 全部测试通过</p>'}
        `;
    }catch(e){el.innerHTML=`<p style="color:var(--red);text-align:center;padding:20px">评估失败: ${e.message}</p>`;}
}
// ==================== Init ====================
loadKnowledge();chatInput.focus();
</script>
